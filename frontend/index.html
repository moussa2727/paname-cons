    /* Animation de chargement subtile */
    #root:empty::before {
      content: '';
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 40px;
      height: 40px;
      border: 3px solid #f3f4f6;
      border-top: 3px solid #0ea5e9;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      z-index: 9999;
    }

    @keyframes spin {
      0% { transform: translate(-50%, -50%) rotate(0deg); }
      100% { transform: translate(-50%, -50%) rotate(360deg); }
    }

    /* Cache temporairement le contenu pendant le chargement */
    .js-loading #root {
      opacity: 0;
      transition: opacity 0.3s ease-in-out;
    }

    .js-loaded #root {
      opacity: 1;
    }
  </style>

  <!-- Script de gestion du chargement - CORRIGÉ -->
  <script>
    // Gestion du statut de chargement
    document.addEventListener('DOMContentLoaded', function() {
      // Marque l'app comme chargée une fois le JS exécuté
      window.addEventListener('load', function() {
        document.body.classList.remove('js-loading');
        document.body.classList.add('js-loaded');
      });

      // Fallback au cas où l'événement load ne se déclenche pas
      setTimeout(function() {
        document.body.classList.remove('js-loading');
        document.body.classList.add('js-loaded');
      }, 3000);
    });

    // Vérification des fonctionnalités modernes
    if (!window.Promise || !window.fetch || !window.Symbol) {
      document.getElementById('root').innerHTML = 
        '<div class="noscript-message">' +
          '<h2 style="color: #dc2626;">Navigateur non supporté</h2>' +
          '<p>Votre navigateur est obsolète et ne supporte pas les fonctionnalités nécessaires.</p>' +
          '<p>Veuillez mettre à jour votre navigateur ou utiliser une version récente de Chrome, Firefox, Safari ou Edge.</p>' +
        '</div>';
      
      document.body.classList.remove('js-loading');
      document.body.classList.add('js-loaded');
    }

    // Gestion des erreurs de chargement globales
    window.addEventListener('error', function(e) {
      console.error('Erreur globale:', e.error);
      document.body.classList.remove('js-loading');
      document.body.classList.add('js-loaded');
    });
  </script>
