services:
  backend:
    container_name: panameconsultingbackend
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NODE_ENV: production
    
    image: panameconsulting:latest
    
    ports:
      - "10000:10000"
    
    environment:
      - NODE_ENV=production
      - PORT=10000
      - HOST=0.0.0.0
      - TZ=Europe/Paris
      - RATE_LIMITING=true
      # Variables pour CORS
      - FRONTEND_URL=https://panameconsulting.vercel.app
      - RAILWAY_STATIC_URL=https://panameconsulting.up.railway.app
    
    env_file:
      - .env 
    
    restart: unless-stopped
    
    dns:
      - 1.1.1.1
      - 8.8.8.8
    
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    
    # ✅ Health check ajouté
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "https://panameconsulting.up.railway.app/api"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    
    networks:
      - backend-network
    
    volumes:
      - ./uploads:/app/uploads
      - ./logs:/app/logs
      - node_modules:/app/node_modules

volumes:
  node_modules:
    driver: local

networks:
  backend-network:
    driver: bridge