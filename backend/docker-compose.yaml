services:
  backend:
    container_name: backend
    build:
      context: .
      dockerfile: Dockerfile
    image: panameconsultingbackend:latest
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - MONGODB_URI=${MONGODB_URI}
    env_file:
      - .env
    restart: unless-stopped
    dns:
      - 1.1.1.1
      - 8.8.8.8
    
    # Vérifie si l'API répond bien
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"