services:
  backend:
    container_name: panameconsultingbackend
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        NODE_ENV: production
    
    image: panameconsulting:latest
    
    ports:
      - "10000:10000"
    
    environment:
      - NODE_ENV=production
      # PORT sera utilisé depuis .env ou la valeur par défaut
      - HOST=0.0.0.0
      - TZ=Europe/Paris
      # Les autres variables sensibles via env_file
      - CORS_ORIGIN=https://panameconsulting.vercel.app
      - RATE_LIMITING=true
    env_file:
      - .env
    
    restart: unless-stopped
    
    dns:
      - 1.1.1.1
      - 8.8.8.8
    
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    
    networks:
      - backend-network
    
    volumes:
      - ./uploads:/app/uploads
      - ./logs:/app/logs
      - node_modules:/app/node_modules

volumes:
  node_modules:
    driver: local

networks:
  backend-network:
    driver: bridge