# railway.toml — Paname Consulting
# Ce fichier configure le build et le déploiement sur Railway

[build]
builder = "nixpacks"
# On ajoute 'postgresql' ici pour que pg_dump soit disponible dans l'environnement
nixPkgs = ["nodejs_20", "nodePackages.pnpm", "postgresql"]
buildCommand = "cd frontend && pnpm install --frozen-lockfile && pnpm build && cd ../backend && pnpm install --frozen-lockfile && pnpm run build && pnpm prisma generate"

[deploy]
startCommand = "cd backend && pnpm prisma migrate deploy && node dist/src/main.js"
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3

# Volume pour les backups locaux persistants
[mounts]
mountPath = "/app/backend/backups"
volume = "backup_storage"