# fly.toml
app = "paname-backend"

[build]
  dockerfile = "Dockerfile"  # Utilise votre Dockerfile existant

[env]
  NODE_ENV = "production"
  PORT = "10000"
  UPLOAD_DIR = "/data/uploads"
  BASE_URL = "https://panameconsulting.fly.dev"

[mounts]
  source = "uploads_volume"
  destination = "/data"

[[services]]
  internal_port = 10000
  protocol = "tcp"
  
  [[services.ports]]
    handlers = ["http"]
    port = 80
    
  [[services.ports]]
    handlers = ["tls", "http"]
    port = 443