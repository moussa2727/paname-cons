# backend/nixpacks.toml

[phases.setup]
nixPkgs = ["nodejs_18"]

[phases.install]
cmds = [
  "npm install -g pnpm",
  "pnpm install"
]

[phases.build]
cmds = [
  "pnpm run build",
  "pnpm prisma generate"
]

[start]
cmd = "node dist/src/main.js"

[variables]
NODE_ENV = "production"
PORT = "10000"
HOST = "0.0.0.0"