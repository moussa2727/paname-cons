# nixpacks.toml — Paname Consulting Monorepo
# Placé à la RACINE du monorepo

[phases.setup]
# Ajout de 'postgresql' pour avoir accès à pg_dump
nixPkgs = ["nodejs_20", "nodePackages.pnpm", "postgresql"]

[phases.install]
cmds = [
  "npm install -g pnpm",
  "cd frontend && pnpm install --frozen-lockfile",
  "cd backend && pnpm install --frozen-lockfile"
]

[phases.build]
cmds = [
  "cd frontend && pnpm build",
  "cd backend && pnpm run build && pnpm prisma generate"
]

[start]
# Exécution des migrations Prisma puis lancement du backend
cmd = "cd backend && pnpm prisma migrate deploy && node dist/src/main.js"